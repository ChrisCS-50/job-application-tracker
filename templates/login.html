<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - JobTracker Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, var(--bg-color) 0%, var(--fiu-navy) 100%);
        }
        .login-card {
            background: var(--card-bg);
            padding: 3rem;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow-lg);
            width: 100%;
            max-width: 450px;
            border: 1px solid var(--card-border);
            text-align: center;
        }
        .login-card h1 {
            color: var(--primary);
            margin-bottom: 2rem;
        }
        .form-control {
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <h1><i class="fa-solid fa-laptop-code"></i> JobTracker Pro</h1>
        <p style="color: var(--text-muted); margin-bottom: 2rem;">Please sign in to access your dashboard.</p>
        
        <div class="flash-messages">
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert alert-{{ category }}" style="text-align: left;">
                            <i class="fa-solid fa-circle-info"></i> {{ message }}
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}
        </div>

        <form method="POST" style="text-align: left;">
            <div class="form-group">
                <label for="username"><i class="fa-solid fa-user"></i> Username</label>
                <input type="text" class="form-control" name="username" id="username" required autofocus autocomplete="username">
            </div>
            <div class="form-group">
                <label for="password"><i class="fa-solid fa-lock"></i> Password</label>
                <input type="password" class="form-control" name="password" id="password" required autocomplete="current-password">
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; padding: 0.8rem; font-size: 1.1rem; margin-top: 1rem;">
                Sign In
            </button>
        </form>
        <p style="margin-top: 1.5rem; font-size: 0.9rem;">
            <a href="{{ url_for('register') }}" style="color: var(--primary); text-decoration: none;">Don't have an account? Register here.</a>
        </p>
    </div>
</body>
</html>
