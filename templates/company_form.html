{% extends 'base.html' %}

{% block content %}
<div class="page-header">
    <h1>
        <i class="fa-solid {% if company %}fa-pen{% else %}fa-plus{% endif %}" style="color: var(--primary); margin-right: 10px;"></i> 
        {% if company %}Edit Company{% else %}Add Company{% endif %}
    </h1>
    <a href="{{ url_for('list_companies') }}" class="btn btn-outlined"><i class="fa-solid fa-arrow-left"></i> Back to List</a>
</div>

<div class="glass-card" style="max-width: 800px; margin: 0 auto;">
    <form action="" method="POST">
        <div class="form-group">
            <label for="name">Company Name *</label>
            <input type="text" id="name" name="name" class="form-control" value="{{ company.company_name if company else '' }}" required>
        </div>
        
        <div class="form-group">
            <label for="industry">Industry</label>
            <input type="text" id="industry" name="industry" class="form-control" value="{{ company.industry if company else '' }}">
        </div>
        
        <div class="form-group">
            <label for="website">Website URL</label>
            <input type="url" id="website" name="website" class="form-control" value="{{ company.website if company else '' }}" placeholder="https://...">
        </div>
        
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
            <div class="form-group">
                <label for="city">City</label>
                <input type="text" id="city" name="city" class="form-control" value="{{ company.city if company else '' }}">
            </div>
            <div class="form-group">
                <label for="state">State</label>
                <input type="text" id="state" name="state" class="form-control" value="{{ company.state if company else '' }}">
            </div>
        </div>
        
        <div class="form-group">
            <label for="notes">Notes / Intelligence</label>
            <textarea id="notes" name="notes" class="form-control" placeholder="Key details about the company culture, tech stack, etc.">{{ company.notes if company else '' }}</textarea>
        </div>
        
        <div style="margin-top: 2rem;">
            <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; padding: 0.8rem;">
                <i class="fa-solid fa-save"></i> Save Company
            </button>
        </div>
    </form>
</div>
{% endblock %}
