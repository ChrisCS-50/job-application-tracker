{% extends 'base.html' %}

{% block content %}
<div class="page-header">
    <h1>
        <i class="fa-solid {% if app %}fa-pen{% else %}fa-plus{% endif %}" style="color: var(--primary); margin-right: 10px;"></i> 
        {% if app %}Edit Application{% else %}Record Application{% endif %}
    </h1>
    <a href="{{ url_for('list_applications') }}" class="btn btn-outlined"><i class="fa-solid fa-arrow-left"></i> Back to List</a>
</div>

<div class="glass-card" style="max-width: 800px; margin: 0 auto;">
    <form action="" method="POST">
        
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem;">
            <div class="form-group" style="margin-bottom: 0;">
                <label for="company_id">Company *</label>
                <select id="company_id" name="company_id" class="form-control" required style="cursor: pointer;">
                    <option value="">-- Select Company --</option>
                    {% for c in companies %}
                    <option value="{{ c.company_id }}" {% if app and app.company_id == c.company_id %}selected{% endif %}>
                        {{ c.company_name }}
                    </option>
                    {% endfor %}
                </select>
            </div>
            
            <div class="form-group" style="margin-bottom: 0;">
                <label for="job_id">Job / Position *</label>
                <select id="job_id" name="job_id" class="form-control" required style="cursor: pointer;" {% if not app %}disabled{% endif %}>
                    <option value="">-- Select Job --</option>
                    {% for j in jobs %}
                    <option value="{{ j.job_id }}" data-company="{{ j.company_id }}" {% if app and app.job_id == j.job_id %}selected{% endif %}>
                        {{ j.job_title }}
                    </option>
                    {% endfor %}
                </select>
            </div>
        </div>
        
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
            <div class="form-group">
                <label for="application_date">Date Applied *</label>
                <input type="date" id="application_date" name="application_date" class="form-control" value="{{ app.application_date if app else current_date }}" required>
            </div>
            <div class="form-group">
                <label for="status">Status</label>
                <select id="status" name="status" class="form-control">
                    <option value="Applied" {% if app and app.status == 'Applied' %}selected{% endif %}>Applied</option>
                    <option value="Screening" {% if app and app.status == 'Screening' %}selected{% endif %}>Screening</option>
                    <option value="Phone Screen" {% if app and app.status == 'Phone Screen' %}selected{% endif %}>Phone Screen</option>
                    <option value="Interview Scheduled" {% if app and app.status == 'Interview Scheduled' %}selected{% endif %}>Interview Scheduled</option>
                    <option value="Interview" {% if app and app.status == 'Interview' %}selected{% endif %}>Interview</option>
                    <option value="Interview Completed" {% if app and app.status == 'Interview Completed' %}selected{% endif %}>Interview Completed</option>
                    <option value="Offer" {% if app and app.status == 'Offer' %}selected{% endif %}>Offer</option>
                    <option value="Offer Accepted" {% if app and app.status == 'Offer Accepted' %}selected{% endif %}>Offer Accepted</option>
                    <option value="Rejected" {% if app and app.status == 'Rejected' %}selected{% endif %}>Rejected</option>
                    <option value="Withdrawn" {% if app and app.status == 'Withdrawn' %}selected{% endif %}>Withdrawn</option>
                </select>
            </div>
        </div>
        
        <div class="form-group">
            <label for="resume_version">Resume Version</label>
            <input type="text" id="resume_version" name="resume_version" class="form-control" value="{{ app.resume_version if app else '' }}" placeholder="e.g. Resume_Backend_v2.pdf">
        </div>
        
        <div class="form-group" style="display: flex; align-items: center; gap: 0.5rem; margin-top: 1.5rem; margin-bottom: 1.5rem;">
            <input type="checkbox" id="cover_letter_sent" name="cover_letter_sent" {% if app and app.cover_letter_sent %}checked{% endif %} style="width: 1.2rem; height: 1.2rem; cursor: pointer;">
            <label for="cover_letter_sent" style="margin-bottom: 0; cursor: pointer;">Cover Letter Included</label>
        </div>
        
        <div class="form-group">
            <label for="interview_contacts">Interview Contact(s)</label>
            <small style="display: block; margin-bottom: 5px; color: var(--text-muted);">Hold Ctrl/Cmd to select multiple contacts associated with this company.</small>
            <select id="interview_contacts" name="interview_contacts" class="form-control" multiple style="height: auto; min-height: 100px; padding: 0.5rem; cursor: pointer;">
                {% for contact in contacts %}
                <option value="{{ contact.contact_id }}" data-company="{{ contact.company_id }}"
                    {% if app and app.interview_contacts and contact.contact_id|string in app.interview_contacts.split(',') %}selected{% endif %}>
                    {{ contact.contact_name }} {% if contact.title %}({{ contact.title }}){% endif %}
                </option>
                {% endfor %}
            </select>
        </div>
        
        <div class="form-group">
            <label for="interview_data">Interview Notes / Data (JSON/Text)</label>
            <textarea id="interview_data" name="interview_data" class="form-control" placeholder='Notes about interviews, technical questions asked, etc.'>{{ app.interview_data if app and app.interview_data else '' }}</textarea>
        </div>
        
        <div style="margin-top: 2rem;">
            <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; padding: 0.8rem;">
                <i class="fa-solid fa-save"></i> Save Application
            </button>
        </div>
    </form>
</div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const companySelect = document.getElementById('company_id');
    const jobSelect = document.getElementById('job_id');
    const contactSelect = document.getElementById('interview_contacts');
    
    function filterJobsAndContacts() {
        const companyId = companySelect.value;
        
        // Reset sub-selects if no company
        if (!companyId) {
            jobSelect.value = '';
            jobSelect.disabled = true;
            for (let i = 0; i < jobSelect.options.length; i++) {
                if (jobSelect.options[i].value !== '') jobSelect.options[i].style.display = 'none';
            }
            if (contactSelect) {
                for (let i = 0; i < contactSelect.options.length; i++) {
                    contactSelect.options[i].style.display = 'none';
                    contactSelect.options[i].selected = false;
                }
            }
            return;
        }
        
        // Handle Jobs
        jobSelect.disabled = false;
        let validSelection = false;
        const currentJobId = jobSelect.value;
        
        for (let i = 0; i < jobSelect.options.length; i++) {
            const opt = jobSelect.options[i];
            if (opt.value === '') continue;
            
            if (opt.getAttribute('data-company') === companyId) {
                opt.style.display = '';
                if (opt.value === currentJobId) validSelection = true;
            } else {
                opt.style.display = 'none';
            }
        }
        if (!validSelection) jobSelect.value = '';
        
        // Handle Contacts
        if (contactSelect) {
            for (let i = 0; i < contactSelect.options.length; i++) {
                const opt = contactSelect.options[i];
                if (opt.getAttribute('data-company') === companyId) {
                    opt.style.display = '';
                } else {
                    opt.style.display = 'none';
                    opt.selected = false; // Deselect if it belongs to another company
                }
            }
        }
    }
    
    companySelect.addEventListener('change', filterJobsAndContacts);
    
    // Run once on load for edit mode
    if (companySelect.value) {
        filterJobsAndContacts();
    }
});
</script>
{% endblock %}
